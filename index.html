<!DOCTYPE html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ELEVO Command Center</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <!-- ELEVO CI Blue Theme -->
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=DM+Sans:wght@300;400;500;600;700&family=Sora:wght@300;400;500;600;700&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.2/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.2/jspdf.plugin.autotable.min.js"></script>
    <style>
      /* ═══ GLOBAL RESET & POLISH ═══ */
      *, *::before, *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }

      html {
        scroll-behavior: smooth;
        text-rendering: optimizeLegibility;
      }

      body {
        background: #06080C;
        color: #e8e6e1;
        overflow: hidden;
      }

      /* ═══ SCROLLBARS ═══ */
      ::-webkit-scrollbar {
        width: 5px;
        height: 5px;
      }
      ::-webkit-scrollbar-track {
        background: transparent;
      }
      ::-webkit-scrollbar-thumb {
        background: rgba(255,255,255,.07);
        border-radius: 10px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: rgba(255,255,255,.14);
      }
      ::-webkit-scrollbar-corner {
        background: transparent;
      }
      * {
        scrollbar-width: thin;
        scrollbar-color: rgba(59,130,246,.1) transparent;
      }

      /* ═══ SELECTION ═══ */
      ::selection {
        background: rgba(59,130,246,.25);
        color: #fff;
      }

      /* ═══ FOCUS STATES ═══ */
      input:focus, textarea:focus, select:focus {
        border-color: rgba(59,130,246,.45) !important;
        box-shadow: 0 0 0 3px rgba(59,130,246,.07);
        outline: none;
      }
      button:focus-visible {
        outline: 2px solid rgba(59,130,246,.35);
        outline-offset: 2px;
      }

      /* ═══ GLOBAL TRANSITIONS ═══ */
      a, button, input, textarea, select {
        transition: all .15s ease;
      }
      button {
        cursor: pointer;
        user-select: none;
      }
      button:active:not(:disabled) {
        transform: scale(0.97);
      }

      /* ═══ INPUTS ═══ */
      input, textarea, select {
        font-family: inherit;
        font-size: inherit;
        color: inherit;
      }
      input::placeholder, textarea::placeholder {
        color: rgba(136,145,165,.5);
        transition: opacity .2s;
      }
      input:focus::placeholder, textarea:focus::placeholder {
        opacity: .35;
      }
      textarea {
        line-height: 1.6;
      }
      select {
        cursor: pointer;
      }

      /* Number input — hide arrows by default */
      input[type="number"]::-webkit-inner-spin-button,
      input[type="number"]::-webkit-outer-spin-button {
        opacity: 0; height: 0;
      }
      input[type="number"]:hover::-webkit-inner-spin-button,
      input[type="number"]:hover::-webkit-outer-spin-button {
        opacity: 1; height: auto;
      }

      /* Date input — style the icon */
      input[type="date"]::-webkit-calendar-picker-indicator {
        filter: invert(.65);
        cursor: pointer;
        opacity: .5;
        transition: opacity .2s;
      }
      input[type="date"]::-webkit-calendar-picker-indicator:hover {
        opacity: 1;
      }

      /* ═══ LINKS ═══ */
      a { color: inherit; text-decoration: none; }

      /* ═══ MODAL BACKDROP ═══ */
      [style*="position: fixed"][style*="rgba(0"] {
        backdrop-filter: blur(6px) saturate(1.2);
        -webkit-backdrop-filter: blur(6px) saturate(1.2);
      }

      /* ═══ ANIMATION KEYFRAMES ═══ */
      @keyframes fadeIn {
        from { opacity: 0; transform: translateY(8px); }
        to { opacity: 1; transform: translateY(0); }
      }
      @keyframes slideUp {
        from { opacity: 0; transform: translateY(16px) scale(.98); }
        to { opacity: 1; transform: translateY(0) scale(1); }
      }
      @keyframes pulse {
        0%, 100% { opacity: 1; }
        50% { opacity: .5; }
      }
      @keyframes shimmer {
        0% { background-position: -200% 0; }
        100% { background-position: 200% 0; }
      }

      /* ═══ UTILITY CLASS ═══ */
      .loading-shimmer {
        background: linear-gradient(90deg, rgba(255,255,255,.02) 25%, rgba(255,255,255,.06) 50%, rgba(255,255,255,.02) 75%);
        background-size: 200% 100%;
        animation: shimmer 1.5s ease-in-out infinite;
      }

      /* ═══ TABLE ═══ */
      table { border-collapse: separate; border-spacing: 0; }

      /* ═══ PRINT ═══ */
      @media print {
        body { background: #fff; color: #000; }
        nav, aside, [style*="position: fixed"] { display: none !important; }
      }
    </style>  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
